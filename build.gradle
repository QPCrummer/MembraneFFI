plugins {
    id 'java'
    id("com.gradleup.shadow") version "9.5.1"
    id 'maven-publish'
}

group = 'com.ishland'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.github.icedland.iced:iced-x86:1.18.0'
    // Most mod loaders bundle this
    compileOnly 'org.ow2.asm:asm:9.5'

    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    // Gradle 9+ no longer injects the launcher automatically
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'net.bytebuddy:byte-buddy-agent:1.14.0'
    // JVMCIValueKindGenerator needs ASM at runtime (compileOnly for mod loaders)
    testRuntimeOnly 'org.ow2.asm:asm:9.5'
}

def targetJavaVersion = 17
tasks.withType(JavaCompile).configureEach {
    // ensure that the encoding is set to UTF-8, no matter what the system default is
    // this fixes some edge cases with special characters not displaying correctly
    // see http://yodaconditions.net/blog/fix-for-java-file-encoding-problems-with-gradle.html
    // If Javadoc is generated, this must be specified in that task too.
    it.options.encoding = "UTF-8"
    if (targetJavaVersion >= 10 || JavaVersion.current().isJava10Compatible()) {
        it.options.release.set(targetJavaVersion)
    }
}

// The correctness battery compares Membrane against java.lang.foreign (FFM),
// which is final since JDK 22 — tests compile for a newer release while the
// library itself stays on 17.
compileTestJava {
    options.release.set(22)
}

java {
    def javaVersion = JavaVersion.toVersion(targetJavaVersion)
    if (JavaVersion.current() < javaVersion) {
        toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    }
    // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
    // if it is present.
    // If you remove this line, sources will not be generated.
    withSourcesJar()
}

test {
    useJUnitPlatform()
    workingDir project.buildDir
    testLogging {
        showStandardStreams = true
        exceptionFormat = 'full'
    }
    jvmArgs "-XX:+UnlockExperimentalVMOptions", "-XX:+EnableJVMCI", "-XX:+UnlockDiagnosticVMOptions", "-XX:PrintAssemblyOptions=intel", "-XX:CompileCommand=print,com.ishland.membraneffi.test.*::*"
    jvmArgs "--enable-native-access=ALL-UNNAMED"
    // Forward the fixture-library location to the correctness batteries
    // (they skip themselves when it is absent).
    if (System.getProperty('membrane.testlibs') != null) {
        systemProperty 'membrane.testlibs', System.getProperty('membrane.testlibs')
    }
}

test {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

shadowJar {
    archiveFileName.set("membrane.jar")
}